<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flucito - Asistente Interflu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="contenedor-chat">
        <h1>Flucito</h1>
        <p class="subtitulo">Asistente virtual de Interflu (versión de prueba)</p>
        <p id="estado-backend" class="estado-backend">Conectando con Flucito...</p>

        <div id="mensajes" class="mensajes"></div>

        <form id="formulario-chat">
            <input
                type="text"
                id="entrada-mensaje"
                placeholder="Escribe tu mensaje..."
                autocomplete="off"
                required
            >
            <button type="submit">Enviar</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
